name: build-and-deploy (reusable)

# Workflow reutilizável central (romulotimbo/ci).
# Cada projeto o chama via `uses:` passando poucos parâmetros.
# Fluxo: build das imagens no runner -> push para GHCR ->
#        (opcional) rsync do código host -> deploy por SSH (pull + up).

on:
  workflow_call:
    inputs:
      app:
        description: "Nome base da imagem em ghcr.io/romulotimbo/<app>"
        required: true
        type: string
      images:
        description: >-
          JSON com a lista de imagens a construir. Cada item aceita:
          suffix, dockerfile, context, build_args e target (opcional).
          Ex.: {"suffix":"-api","dockerfile":"Dockerfile","context":".","build_args":"KEY=val","target":""}
        required: true
        type: string
      deploy_dir:
        description: "Caminho do projeto na VPS (onde está o compose)"
        required: true
        type: string
      compose_file:
        description: "Arquivo compose usado no deploy"
        default: "docker-compose.prod.yml"
        type: string
      migrate_service:
        description: "Nome de um service de migração no compose para rodar antes do up (vazio = pular)"
        default: ""
        type: string
      services:
        description: "Serviços a atualizar no pull/up (espaço-separado). Vazio = todos. Use para não tocar em serviços compartilhados (ex.: postgres)."
        default: ""
        type: string
      sync_host_code:
        description: >-
          Se true, faz rsync do checkout do caller para deploy_dir na VPS
          (preserva .env, data*, .venv, logs; sem --delete).
        type: boolean
        default: false
      pip_install:
        description: >-
          Após sync_host_code, roda .venv/bin/pip install -r requirements.txt
          quando .venv e requirements.txt existirem.
        type: boolean
        default: true
    secrets:
      VPS_HOST:
        required: true
      VPS_PORT:
        required: true
      VPS_USER:
        required: true
      VPS_SSH_KEY:
        required: true
      GHCR_TOKEN:
        description: "PAT com read:packages (login na VPS antes do pull)"
        required: true

concurrency:
  group: deploy-${{ inputs.app }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: ${{ fromJSON(inputs.images) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/romulotimbo/${{ inputs.app }}${{ matrix.image.suffix }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.target }}
          push: true
          build-args: ${{ matrix.image.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.app }}${{ matrix.image.suffix }}
          cache-to: type=gha,mode=max,scope=${{ inputs.app }}${{ matrix.image.suffix }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        if: inputs.sync_host_code
        uses: actions/checkout@v4

      - name: Setup SSH for rsync
        if: inputs.sync_host_code
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync host code (rsync)
        if: inputs.sync_host_code
        run: |
          set -euo pipefail
          RSYNC_SSH="ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=accept-new"
          rsync -az --no-owner --no-group \
            -e "$RSYNC_SSH" \
            --exclude '.env' \
            --exclude '.venv/' \
            --exclude 'data/' \
            --exclude 'data-*/' \
            --exclude 'logs/' \
            --exclude '__pycache__/' \
            --exclude '.git/' \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ inputs.deploy_dir }}/"

      - name: Deploy por SSH (host post-sync + pull + up)
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_SHA: ${{ github.sha }}
          SYNC_HOST: ${{ inputs.sync_host_code }}
          PIP_INSTALL: ${{ inputs.pip_install }}
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: "20m"
          envs: GHCR_TOKEN,DEPLOY_SHA,SYNC_HOST,PIP_INSTALL
          script: |
            set -euo pipefail
            cd "${{ inputs.deploy_dir }}"

            if [ "${SYNC_HOST}" = "true" ]; then
              printf '%s\n' "$DEPLOY_SHA" > DEPLOYED_SHA
              echo "DEPLOYED_SHA=$(cat DEPLOYED_SHA)"
              if [ "${PIP_INSTALL}" = "true" ] && [ -x .venv/bin/pip ] && [ -f requirements.txt ]; then
                .venv/bin/pip install -r requirements.txt
              fi
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u romulotimbo --password-stdin
            docker compose -f "${{ inputs.compose_file }}" pull ${{ inputs.services }}
            if [ -n "${{ inputs.migrate_service }}" ]; then
              docker compose -f "${{ inputs.compose_file }}" run --rm "${{ inputs.migrate_service }}"
            fi
            docker compose -f "${{ inputs.compose_file }}" up -d ${{ inputs.services }}
            docker image prune -f
