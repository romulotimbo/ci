name: test-reusable
on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      images:
        required: true
        type: string
    secrets:
      VPS_HOST:
        required: true
concurrency:
  group: t-${{ inputs.app }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  t:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJSON(inputs.images) }}
    steps:
      - run: echo "suffix=${{ matrix.image.suffix }} host_set=${{ secrets.VPS_HOST != '' }}"
